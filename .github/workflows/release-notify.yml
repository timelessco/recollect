jobs:
  notify-slack:
    name: 📣 Notify Slack
    runs-on: ubuntu-latest
    steps:
      - name: Send release notification
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *${{ github.event.release.name }}* is live\n<${{ github.event.release.html_url }}|View release notes>"
                  }
                }
              ]
            }
          webhook: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
    timeout-minutes: 5
name: Release Notify

on:
  release:
    types:
      - published

permissions:
  contents: read
