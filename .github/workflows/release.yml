concurrency:
  group: ${{ github.workflow }}

jobs:
  cleanup:
    name: 🧹 Cleanup
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN }}

      - uses: ./.github/actions/git-config

      - name: Backmerge main into dev
        run: |
          git fetch origin
          git checkout -b dev origin/dev
          git merge origin/main -m "chore(release): merge main back into dev after release"
          # Clear API changelog — accumulated changes are now released
          # Uses a separate commit (not --amend) to preserve the merge commit SHA,
          # which must match origin/main for merge-base --is-ancestor to pass
          if [ -s docs/API_CHANGELOG.md ]; then
            > docs/API_CHANGELOG.md
            git add docs/API_CHANGELOG.md
            git commit -m "chore(release): clear API changelog after release"
          fi
          git push origin dev

    timeout-minutes: 5

  release:
    if: contains(github.event.head_commit.message, '/release/')
    name: 🚀 Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN }}

      - uses: ./.github/actions/pnpm-install

      - env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        name: Release
        run: pnpm release

    timeout-minutes: 15

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
